<!DOCTYPE html>
<html>
<body style="text-align:center;margin-top:50px;">

<h2>パスワード入力</h2>
<input type="password" id="pw">
<button onclick="check()">OK</button>
<p id="msg" style="color:red;"></p>

<script>
function check(){
  var pw=document.getElementById("pw").value;
  if(pw==="Goukakutama5"){
    location="https://sites.google.com/view/monndai-yotuya/%E3%83%9B%E3%83%BC%E3%83%A0";
  }else{
    document.getElementById("msg").innerText="パスワードが間違っています";
  }
}
</script>

</body>
</html>
